name: Java Quality Check (Checkstyle)

on:
  pull_request:
    branches: [ "master", "main" ]

jobs:
  checkstyle-linter:
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar el código del repositorio
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Configurar el entorno de Java (JDK 17 es el estándar actual)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 3. Ejecutar el comando de Maven para el Linter
      - name: Run Checkstyle
        run: mvn checkstyle:check